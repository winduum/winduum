<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Winduum UI</title>
    <meta name="viewport" content="width=device-width, user-scalable=0, initial-scale=1, viewport-fit=cover"/>
    <link rel="stylesheet" href="/src/test.css">
</head>
<body class="p-4xl flex flex-col items-start gap-4">
<dialog class="x-drawer noscript:starting:-translate-x-full noscript:not-open:-translate-x-full noscript:duration-500" is="x-drawer" id="drawerLeft" closedby="any">
    <div class="x-drawer-scroller snap-x snap-mandatory noscript:after:content-none">
        <nav class="x-drawer-content" data-x-drawer-part="content">
            Drawer content
            <button command="request-close" commandfor="drawerLeft">Close</button>
        </nav>
    </div>
</dialog>

<dialog class="x-drawer noscript:starting:translate-x-full noscript:not-open:translate-x-full noscript:ms-auto noscript:duration-500" style="animation-direction: reverse" is="x-drawer" id="drawerRight" closedby="any" data-placement="right">
    <div class="x-drawer-scroller after:order-first snap-x snap-mandatory noscript:after:content-none">
        <nav class="x-drawer-content" data-x-drawer-part="content">
            Drawer content
            <button command="request-close" commandfor="drawerRight">Close</button>
        </nav>
    </div>
</dialog>

<dialog class="x-drawer noscript:starting:translate-y-full noscript:not-open:translate-y-full noscript:mbs-auto noscript:duration-500" style="animation-direction: reverse" is="x-drawer" id="drawerBottom" closedby="any" data-placement="bottom">
    <div class="x-drawer-scroller flex flex-col after:order-first snap-y snap-mandatory noscript:after:content-none">
        <nav class="x-drawer-content" data-x-drawer-part="content" style="--x-drawer-content-inline-size: 100dvw;--x-drawer-content-block-size: calc(100vh - 4rem);">
            Drawer content
            <button command="request-close" commandfor="drawerBottom">Close</button>
        </nav>
    </div>
</dialog>

<dialog class="x-drawer noscript:starting:-translate-y-full noscript:not-open:-translate-y-full noscript:duration-500" is="x-drawer" id="drawerTop" closedby="any" data-placement="top">
    <div class="x-drawer-scroller flex flex-col snap-y snap-mandatory noscript:after:content-none">
        <nav class="x-drawer-content" data-x-drawer-part="content" style="--x-drawer-content-inline-size: 100dvw;--x-drawer-content-block-size: calc(100vh - 4rem);">
            Drawer content
            <button command="request-close" commandfor="drawerTop">Close</button>
        </nav>
    </div>
</dialog>

    <button class="x-button" command="show-modal" commandfor="drawerLeft">Open left drawer</button>
    <button class="x-button" command="show-modal" commandfor="drawerRight">Open right drawer</button>
    <button class="x-button" command="show-modal" commandfor="drawerBottom">Open bottom drawer</button>
    <button class="x-button" command="show-modal" commandfor="drawerTop">Open top drawer</button>

    <script type="module">
      import { initializeController } from "webuum";
      import { supportsIs } from "webuum/supports";

      if (!supportsIs()) {
        await import('@webreflection/custom-elements-builtin')
      }

      customElements.define('x-drawer', class Drawer extends HTMLDialogElement {
        static parts = {
          $content: null,
        }

        static props = {
          $placement: 'left',
        }

        constructor() {
          super()
          initializeController(this)
          this.$controller = new AbortController()
        }

        async partConnectedCallback(name) {
          if (name === '$content') {
            const { drawerObserver, drawerEvents } = await import('/src/components/drawer/index.js')
            const { signal } = this.$controller

            drawerEvents(this, this.$content, this.$placement, signal)

            this.$observer = drawerObserver(this, this.$placement)
            this.$observer.observe(this.$content)
          }
        }

        partDisconnectedCallback(name) {
          if (name === '$content') {
            this.$observer?.disconnect()
            this.$controller?.abort()
          }
        }

        async showModal() {
          const { showDrawer } = await import('/src/components/drawer/index.js')

          super.showModal()

          showDrawer(this.firstElementChild, this.$placement)
        }
      }, { extends: 'dialog' })
    </script>

    <svg class="hidden">
        <symbol id="icon-exclamation-circle" class="ms-auto text-error" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m9-.75a9 9 0 11-18 0 9 9 0 0118 0zm-9 3.75h.008v.008H12v-.008z" />
        </symbol>
    </svg>
</body>
</html>
